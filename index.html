<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Skoog Open Source</title>

    <style>
        * {
            color: white;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #FF0;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
                Roboto, Helvetica, Arial, sans-serif;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4vw;
            box-sizing: border-box;
        }

        #text {
            text-align: center;
            font-weight: 700;
            line-height: 1.05;
            word-break: break-word;
        }
    </style>
</head>

<body>

    <div id="container">
        <div id="text"></div>
    </div>

    <script>
        const colors = ["#11D", "#1A1", "#D11", "#FA0", "#FF0"]
        const randColorId = Math.floor(Math.random() * 5);
        
        console.log(randColorId)
        document.body.style.background = colors[randColorId]
        if (randColorId === 4) {
            document.querySelectorAll("*").forEach(el => {
                el.style.color = "black";
            });            
        }

        const startDate = new Date("2026-07-09T00:00:00");
        function getDayNumber() {
            const now = new Date();
            
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const start = new Date(
                startDate.getFullYear(),
                startDate.getMonth(),
                startDate.getDate()
            );

            const diffDays = Math.floor((today - start) / 86400000);

            return diffDays + 1;
        }

        const text = document.getElementById("text");

        function updateText() {
            text.textContent =
                `Day ${getDayNumber()} of asking for Skoog to be made open source`;
        }

        function fitText() {
            const container = document.getElementById("container");

            let low = 8;
            let high = 1000;
            let best = low;

            while (low <= high) {
                const mid = Math.floor((low + high) / 2);
                text.style.fontSize = mid + "px";

                if (
                    text.scrollWidth <= container.clientWidth &&
                    text.scrollHeight <= container.clientHeight
                ) {
                    best = mid;
                    low = mid + 1;
                } else {
                    high = mid - 1;
                }
            }

            text.style.fontSize = best + "px";
        }

        function render() {
            updateText();
            fitText();
        }

        render();
        window.addEventListener("resize", fitText);
    </script>

</body>

</html>
